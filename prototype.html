<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polar Amplification — 3D Observatory</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #050810;
    --bg-card: #0a0f1a;
    --bg-panel: #0d1220;
    --border: #1a2540;
    --border-glow: #1e3a5f;
    --text-primary: #e8ecf4;
    --text-secondary: #6b7a94;
    --text-dim: #3a4a64;
    --accent-red: #e94560;
    --accent-orange: #ff9f43;
    --accent-yellow: #ffc048;
    --accent-blue: #4fc3f7;
    --accent-cyan: #00e5ff;
    --accent-green: #4caf50;
    --glow-red: rgba(233, 69, 96, 0.3);
    --glow-blue: rgba(79, 195, 247, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    padding: 20px 28px 12px;
    display: flex;
    align-items: baseline;
    gap: 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(79,195,247,0.03) 0%, transparent 100%);
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .header h1 b { color: var(--accent-red); font-weight: 700; }
  .header .tag {
    font-size: 10px;
    color: var(--accent-cyan);
    background: rgba(0,229,255,0.08);
    padding: 3px 10px;
    border-radius: 10px;
    border: 1px solid rgba(0,229,255,0.2);
    letter-spacing: 1px;
  }
  .header .meta {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Main grid */
  .main {
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    height: calc(100vh - 110px);
    background: var(--border);
  }

  .panel {
    background: var(--bg-card);
    position: relative;
    overflow: hidden;
  }
  .panel-title {
    position: absolute;
    top: 12px;
    left: 16px;
    font-size: 10px;
    color: var(--accent-blue);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    z-index: 10;
    background: rgba(10,15,26,0.8);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid rgba(79,195,247,0.15);
  }
  .panel-title .num {
    color: var(--accent-red);
    margin-right: 6px;
    font-weight: 700;
  }

  /* 3D chart spans full left column */
  .panel-3d { grid-row: 1 / 3; }
  #chart3d { width: 100%; height: 100%; }

  /* Heatmap */
  #chartHeat { width: 100%; height: 100%; }

  /* Time series */
  #chartTime { width: 100%; height: 100%; }

  /* Bottom controls */
  .controls {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 12px 28px;
    background: var(--bg-card);
    border-top: 1px solid var(--border);
  }
  .play-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 2px solid var(--accent-red);
    background: transparent;
    color: var(--accent-red);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .play-btn:hover { background: var(--accent-red); color: #fff; }
  .play-btn.playing { background: var(--accent-red); color: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 var(--glow-red); } 50% { box-shadow: 0 0 20px 4px var(--glow-red); } }

  .year-display {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 48px;
    font-weight: 200;
    color: var(--accent-red);
    min-width: 120px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .slider-wrap { flex: 1; }
  .slider-wrap input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .slider-wrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    background: var(--accent-red);
    border-radius: 50%;
    cursor: grab;
    box-shadow: 0 0 10px var(--glow-red);
  }
  .slider-labels { display: flex; justify-content: space-between; margin-top: 4px; }
  .slider-labels span { font-size: 9px; color: var(--text-dim); }

  .stats { display: flex; gap: 24px; margin-left: auto; }
  .stat { text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .stat-label { font-size: 8px; color: var(--text-dim); margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; }

  .mode-btns { display: flex; gap: 4px; }
  .mode-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
  .mode-btn.active { background: var(--accent-blue); color: #000; border-color: var(--accent-blue); font-weight: 600; }

  /* Scanline effect */
  .panel::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Corner decorations */
  .panel::before {
    content: '';
    position: absolute;
    top: 8px; right: 8px;
    width: 8px; height: 8px;
    border-top: 2px solid var(--accent-cyan);
    border-right: 2px solid var(--accent-cyan);
    opacity: 0.4;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="header">
  <h1>POLAR <b>AMPLIFICATION</b></h1>
  <span class="tag">3D CROSS ANALYSIS</span>
  <span class="meta">NOAA GML · NASA GISS · 1979–2025</span>
</div>

<div class="main">
  <!-- 3D Scatter -->
  <div class="panel panel-3d">
    <div class="panel-title"><span class="num">01</span>3D Scatter — CO₂ × Latitude × Temperature</div>
    <div id="chart3d"></div>
  </div>

  <!-- Heatmap -->
  <div class="panel">
    <div class="panel-title"><span class="num">02</span>Heatmap — Latitude × Year</div>
    <div id="chartHeat"></div>
  </div>

  <!-- Time Series -->
  <div class="panel">
    <div class="panel-title"><span class="num">03</span>Time Series — CO₂ & Temperature</div>
    <div id="chartTime"></div>
  </div>
</div>

<div class="controls">
  <button class="play-btn" id="playBtn">▶</button>
  <div class="year-display" id="yearDisplay">2025</div>
  <div class="slider-wrap">
    <input type="range" id="yearSlider" min="1979" max="2025" value="2025" step="1">
    <div class="slider-labels">

    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="sCO2" style="color:var(--accent-yellow)">425.6</div>
      <div class="stat-label">CO₂ ppm</div>
    </div>
    <div class="stat">

    </div>
    <div class="stat">

      <div class="stat-label">Arctic °C</div>
    </div>
  </div>
  <div class="mode-btns">
    <button class="mode-btn active" data-mode="year">Year</button>
    <button class="mode-btn" data-mode="trail">Trail</button>
    <button class="mode-btn" data-mode="all">All</button>
  </div>
</div>

};

const years = Object.keys(tempRaw).map(Number);

// ====== STATE ======
let currentYear = 2025;
let mode = 'year'; // 'year', 'trail', 'all'
let playing = false;
let animTimer = null;

// ====== CHARTS ======
const chart3d = echarts.init(document.getElementById('chart3d'));
const chartHeat = echarts.init(document.getElementById('chartHeat'));
const chartTime = echarts.init(document.getElementById('chartTime'));

// ====== 3D SCATTER ======
function build3DData(yr, mode) {
  const data = [];
  if (mode === 'year') {
    bandDefs.forEach((b, i) => {
      const co2 = co2Map[yr];
      const temp = tempRaw[yr][b.key];
      data.push({
        value: [co2, i, temp],
        itemStyle: { color: b.color, opacity: 0.9 },
        bandIdx: i,
        year: yr,
      });
    });
  } else if (mode === 'trail') {
    bandDefs.forEach((b, bi) => {
      years.forEach(y => {
        const co2 = co2Map[y];
        const temp = tempRaw[y][b.key];
        const isCurrent = y === yr;
        const alpha = isCurrent ? 1 : 0.12 + 0.5 * (y - 1979) / (2025 - 1979);
        const size = isCurrent ? 16 : 3 + 4 * (y - 1979) / (2025 - 1979);
        data.push({
          value: [co2, bi, temp],
          itemStyle: { color: b.color, opacity: alpha },
          symbolSize: size,
          bandIdx: bi,
          year: y,
        });
      });
    });
  } else { // all
    bandDefs.forEach((b, bi) => {
      years.forEach(y => {
        const co2 = co2Map[y];
        const temp = tempRaw[y][b.key];
        const alpha = 0.06 + 0.6 * (y - 1979) / (2025 - 1979);
        const size = 2 + 5 * (y - 1979) / (2025 - 1979);
        data.push({
          value: [co2, bi, temp],
          itemStyle: { color: b.color, opacity: alpha },
          symbolSize: size,
          bandIdx: bi,
          year: y,
        });
      });
    });
  }
  return data;
}

function update3D() {
  const data = build3DData(currentYear, mode);
  chart3d.setOption({
    grid3D: {
      boxWidth: 120, boxHeight: 80, boxDepth: 80,
      viewControl: { autoRotate: false, distance: 280, alpha: 20, beta: 35 },
      axisLine: { lineStyle: { color: '#1a2540' } },
      axisPointer: { lineStyle: { color: '#333' } },
      splitLine: { lineStyle: { color: '#111' } },
      axisLabel: { color: '#555', fontSize: 10 },
      axisName: { color: '#888', fontSize: 11 },
      environment: 'transparent',
      light: { main: { intensity: 1.2, shadow: false }, ambient: { intensity: 0.4 } },
    },
    xAxis3D: { type: 'value', name: 'CO₂ (ppm)', min: 330, max: 430 },
    yAxis3D: {
      type: 'category', name: 'Latitude',
      data: bandDefs.map(b => b.short),
      axisLabel: { color: '#888', fontSize: 9 },
    },
    zAxis3D: { type: 'value', name: 'Temp (°C)', min: -1.5, max: 4 },
    series: [{
      type: 'scatter3D',
      data: data,
      symbolSize: mode === 'year' ? 14 : undefined,
      shading: 'color',
      label: { show: false },
      emphasis: {
        label: { show: true, formatter: p => {
          const d = data[p.dataIndex];
          return `${bandDefs[d.bandIdx].short}\n${d.year}\nCO₂:${d.value[0]}\n${d.value[2]>=0?'+':''}${d.value[2].toFixed(2)}°C`;
        }, color: '#fff', fontSize: 11, backgroundColor: 'rgba(0,0,0,0.8)', padding: 6, borderRadius: 4 },
        itemStyle: { opacity: 1 }
      }
    }],
    tooltip: {
      formatter: p => {
        const d = p.data;
        return `<b style="color:${bandDefs[d.bandIdx].color}">${bandDefs[d.bandIdx].label}</b><br/>Year: ${d.year}<br/>CO₂: ${d.value[0]} ppm<br/>Temp: ${d.value[2]>=0?'+':''}${d.value[2].toFixed(2)}°C`;
      },
      backgroundColor: 'rgba(10,15,26,0.95)', borderColor: '#333', textStyle: { color: '#ddd', fontFamily: 'JetBrains Mono', fontSize: 11 }
    },
    backgroundColor: 'transparent',
    animation: true, animationDuration: 400, animationEasing: 'cubicOut',
  });
}

// ====== HEATMAP ======
function updateHeatmap() {
  const heatData = [];
  bandDefs.forEach((b, bi) => {
    years.forEach((y, yi) => {
      heatData.push([yi, bi, tempRaw[y][b.key]]);
    });
  });

  chartHeat.setOption({
    grid: { left: 80, right: 60, top: 35, bottom: 30 },
    xAxis: { type: 'category', data: years.map(String), axisLabel: { color: '#555', fontSize: 8, interval: 4 }, splitArea: { show: false } },
    yAxis: { type: 'category', data: bandDefs.map(b => b.short), axisLabel: { color: '#888', fontSize: 9 }, splitArea: { show: false } },
    visualMap: {
      min: -1.5, max: 3.5, calculable: false, orient: 'vertical', right: 6, top: 'center',
      inRange: { color: ['#2166ac', '#67a9cf', '#d1e5f0', '#f7f7f7', '#fddbc7', '#ef8a62', '#b2182b'] },
      textStyle: { color: '#666', fontSize: 10 },
    },
    series: [{
      type: 'heatmap',
      data: heatData,
      label: { show: false },
      emphasis: { itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0,0,0,0.5)' } },
    }],
    tooltip: {
      formatter: p => `<b>${bandDefs[p.value[1]].short}</b> · ${years[p.value[0]]}<br/>Temp: ${p.value[2]>=0?'+':''}${p.value[2].toFixed(2)}°C`,
      backgroundColor: 'rgba(10,15,26,0.95)', borderColor: '#333', textStyle: { color: '#ddd', fontFamily: 'JetBrains Mono', fontSize: 11 }
    },
    // Mark current year column
    markLine: { silent: true },
    backgroundColor: 'transparent',
    animation: true, animationDuration: 400,
  });

  // Highlight current year column with markLine
  const yi = years.indexOf(currentYear);
  chartHeat.setOption({
    series: [{
      markPoint: {
        data: bandDefs.map((b, bi) => ({ coord: [yi, bi], symbol: 'rect', symbolSize: [2, 18], itemStyle: { color: 'rgba(233,69,96,0.6)' } })),
        silent: true, animation: false,
      }
    }]
  });
}

// ====== TIME SERIES ======
function updateTimeSeries() {
  const curCO2 = co2Map[currentYear];
  chartTime.setOption({
    grid: { left: 50, right: 50, top: 30, bottom: 30 },
    xAxis: { type: 'category', data: years, axisLabel: { color: '#555', fontSize: 9, interval: 4 }, axisLine: { lineStyle: { color: '#1a2540' } } },
    yAxis: [
      { type: 'value', name: 'CO₂', nameTextStyle: { color: '#ffc048', fontSize: 10 }, axisLabel: { color: '#555', fontSize: 9 }, splitLine: { lineStyle: { color: '#111' } } },
      { type: 'value', name: '°C', nameTextStyle: { color: '#e94560', fontSize: 10 }, axisLabel: { color: '#555', fontSize: 9 }, splitLine: { show: false } },
    ],
    series: [
      {
        name: 'CO₂', type: 'line', yAxisIndex: 0,
        data: years.map(y => co2Map[y]),
        lineStyle: { color: '#ffc048', width: 2 }, symbol: 'none',
        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1, colorStops: [{ offset: 0, color: 'rgba(255,192,72,0.15)' }, { offset: 1, color: 'transparent' }] } },
      },
      {
        name: 'Global', type: 'line', yAxisIndex: 1,
        data: years.map(y => tempRaw[y].Glob),
        lineStyle: { color: '#e94560', width: 2 }, symbol: 'none',
      },
      {
        name: 'Arctic', type: 'line', yAxisIndex: 1,
        data: years.map(y => tempRaw[y]['64N-90N']),
        lineStyle: { color: '#e31a1c', width: 1.5, type: 'dashed' }, symbol: 'none',
      },
      {
        // Current year marker
        type: 'line',
        data: years.map(y => y === currentYear ? co2Map[y] : null),
        symbol: 'circle', symbolSize: 8, itemStyle: { color: '#ffc048' }, lineStyle: { width: 0 },
        yAxisIndex: 0,
      },
    ],
    legend: { show: false },
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(10,15,26,0.95)', borderColor: '#333', textStyle: { color: '#ddd', fontFamily: 'JetBrains Mono', fontSize: 11 },
      formatter: ps => {
        const idx = ps[0].dataIndex; const y = years[idx];
        return `<b>${y}</b><br/>CO₂: ${co2Map[y]} ppm<br/>Global: ${tempRaw[y].Glob>=0?'+':''}${tempRaw[y].Glob.toFixed(2)}°C<br/>Arctic: ${tempRaw[y]['64N-90N']>=0?'+':''}${tempRaw[y]['64N-90N'].toFixed(2)}°C`;
      }
    },
    backgroundColor: 'transparent',
    animation: true, animationDuration: 400,
  });
}

// ====== UPDATE ALL ======
function updateAll(yr) {
  currentYear = yr;
  const d = tempRaw[yr];
  if (!d) return;

  document.getElementById('yearDisplay').textContent = yr;
  document.getElementById('yearSlider').value = yr;
  document.getElementById('sCO2').textContent = co2Map[yr].toFixed(1);
  document.getElementById('sGlob').textContent = (d.Glob>=0?'+':'') + d.Glob.toFixed(2);
  document.getElementById('sArctic').textContent = (d['64N-90N']>=0?'+':'') + d['64N-90N'].toFixed(2);

  update3D();
  updateHeatmap();
  updateTimeSeries();
}

// ====== CONTROLS ======
const slider = document.getElementById('yearSlider');
const playBtn = document.getElementById('playBtn');

slider.addEventListener('input', () => updateAll(+slider.value));

function togglePlay() {
  if (playing) {
    clearInterval(animTimer); playing = false;
    playBtn.textContent = '▶'; playBtn.classList.remove('playing');
  } else {
    playing = true; playBtn.textContent = '⏸'; playBtn.classList.add('playing');
    let yr = +slider.value;
    if (yr >= 2025) { yr = 1979; updateAll(yr); }
    animTimer = setInterval(() => {
      yr++; if (yr > 2025) { clearInterval(animTimer); playing = false; playBtn.textContent = '▶'; playBtn.classList.remove('playing'); return; }
      updateAll(yr);
    }, 300);
  }
}
playBtn.addEventListener('click', togglePlay);

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') { updateAll(Math.max(1979, +slider.value - 1)); }
  if (e.code === 'ArrowRight') { updateAll(Math.min(2025, +slider.value + 1)); }
});

// Mode toggle
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    update3D();
  });
});

// Heatmap click → update year
chartHeat.on('click', p => {
  if (p.value) {
    updateAll(years[p.value[0]]);
  }
});

// Resize
window.addEventListener('resize', () => { chart3d.resize(); chartHeat.resize(); chartTime.resize(); });

// Init
updateAll(2025);
</script>
